<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dash Prototype</title>
<style>
body { font-family: Arial; text-align:center; background:#222; color:white; }
canvas { border:2px solid white; background:#111; }
button { margin:5px; padding:10px; }
</style>
</head>
<body>
<h1>Dash Prototype</h1>
<p>Space = Jump</p>

<div>
  <button onclick="skin='cyan'">Cyan Skin</button>
  <button onclick="skin='red'">Red Skin</button>
  <button onclick="skin='lime'">Lime Skin</button>
</div>

<div>
  <button onclick="startLevel(1)">Level 1</button>
  <button onclick="startLevel(2)">Level 2</button>
  <button onclick="startLevel(3)">Level 3</button>
  <button onclick="startLevel(4)">Level 4</button>
  <button onclick="startLevel(5)">Level 5</button>
</div>

<canvas id="game" width="800" height="250"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let skin = "cyan";
let level = 1;
let player, obstacles;

function startLevel(lvl){
  level = lvl;
  player = {x:80,y:180,vy:0,size:25};
  obstacles = [];
  for(let i=0;i<10+lvl*5;i++){
    obstacles.push({x:300+i*120,y:200,w:25,h:50});
  }
}
startLevel(1);

document.addEventListener("keydown", e=>{
  if(e.code==="Space" && player.y>=180){
    player.vy=-12;
  }
});

function update(){
  player.vy += 0.6;
  player.y += player.vy;

  if(player.y>180){
    player.y=180;
    player.vy=0;
  }

  obstacles.forEach(o=>o.x -= 4 + level);

  for(const o of obstacles){
    if(player.x < o.x+o.w &&
       player.x+player.size > o.x &&
       player.y < o.y+o.h &&
       player.y+player.size > o.y){
      alert("You crashed! Restarting level.");
      startLevel(level);
      break;
    }
  }

  if(obstacles.length && obstacles[obstacles.length-1].x < -50){
    alert("Level " + level + " complete!");
    if(level < 5) startLevel(level+1);
    else startLevel(1);
  }
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  ctx.fillStyle = "white";
  ctx.fillRect(0,205,c.width,5);

  ctx.fillStyle = skin;
  ctx.fillRect(player.x,player.y,player.size,player.size);

  ctx.fillStyle = "orange";
  obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));

  ctx.fillStyle = "white";
  ctx.fillText("Level: " + level, 10, 20);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
